<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="./menu.css">
    <link rel="stylesheet" href="./navbar.css">
</head>
<body>
    <div class="header">
        <button class="menu-toggle" aria-label="Toggle Menu">☰</button>
        <img class="logo" src="./logo.JPG" alt="Logo">
        <h1>Aditya Pure Veg</h1>
    </div>

    <div class="nav-links">
        <a href="./index.html">Home</a>
        <a href="./menu.html" class="active">Menu</a>
        <a href="./photos.html">Photos</a>
        <a href="./contact.html">Contact Us</a>
        <a href="./reviews.html">Reviews</a>
    </div>

    <div class="menu-viewer-wrapper">
        <button id="prev-btn" class="nav-arrow left-arrow" disabled>
            &#10094;
        </button>

        <div class="menu-book">
            <div class="menu-page active" data-page="0">
                <img src="M01.jpg" alt="Menu Page 1" loading="lazy" width="700" height="1050">
            </div>
            <div class="menu-page" data-page="1">
                <img src="M02.jpg" alt="Menu Page 2" loading="lazy" width="700" height="1050">
            </div>
            <div class="menu-page" data-page="2">
                <img src="M03.jpg" alt="Menu Page 3" loading="lazy" width="700" height="1050">
            </div>
            <div class="menu-page" data-page="3">
                <img src="M04.jpg" alt="Menu Page 4" loading="lazy" width="700" height="1050">
            </div>
            <div class="menu-page" data-page="4">
                <img src="M05.jpg" alt="Menu Page 5" loading="lazy" width="700" height="1050">
            </div>
            <div class="menu-page" data-page="5">
                <img src="M06.jpg" alt="Menu Page 6" loading="lazy" width="700" height="1050">
            </div>
            <div class="menu-page" data-page="6">
                <img src="M07.jpg" alt="Menu Page 7" loading="lazy" width="700" height="1050">
            </div>
            <div class="menu-page" data-page="7">

            </div>

            </div>
        </div>

        <button id="next-btn" class="nav-arrow right-arrow">
            &#10095;
        </button>
    </div>

    <footer class="footer">
        <p>© Aditya Pure Veg</p>
    </footer>

    <div id="chat-button" onclick="toggleChat()" style="position:fixed; bottom:20px; right:20px; background:#700303; color:white; width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:1000; font-size:24px; box-shadow:0 4px 10px rgba(0,0,0,0.3);">
        💬
    </div>

    <div id="chat-box" style="display:none; position:fixed; bottom:90px; right:20px; width:300px; height:400px; background:white; border-radius:10px; flex-direction:column; z-index:1000; box-shadow:0 8px 20px rgba(0,0,0,0.2); font-family:Arial, sans-serif; overflow:hidden;">
        <div style="background:#700303; color:white; padding:15px; display:flex; justify-content:space-between;">
            <strong>Aditya Assistant</strong>
            <span onclick="toggleChat()" style="cursor:pointer;">✖</span>
        </div>
        <div id="chat-display" style="flex:1; overflow-y:auto; padding:15px; background:#faf6ce72; display:flex; flex-direction:column; gap:10px;">
            <div class="bot-msg" style="background:white; padding:8px; border-radius:5px; border-left:4px solid #700303; font-size:14px;">Namaste! Ask me about our menu, hours, or delivery.</div>
        </div>
        <div style="display:flex; padding:10px; border-top:1px solid #ddd; background:white;">
            <input type="text" id="user-input" placeholder="Type here..." style="flex:1; border:1px solid #ddd; padding:8px; border-radius:4px; outline:none;" onkeypress="checkEnter(event)">
            <button onclick="handleChat()" style="background:#700303; color:white; border:none; margin-left:5px; padding:8px 15px; border-radius:4px; cursor:pointer;">Send</button>
        </div>
    </div>

    <!-- Load menu.js FIRST, then script.js for the chat -->
    <script src="./menu.js"></script>
    <script src="./script.js"></script>
</body>
</html>
